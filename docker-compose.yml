services:
  postgres:
    image: postgres:16-alpine
    container_name: error-monitor-postgres
    environment:
      POSTGRES_DB: error_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - airport-chat-net

  error-monitor-server:
    build: .
    container_name: error-monitor-server
    ports:
      - "8090:8090"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: error_monitor
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      GROQ_API_KEY: ${GROQ_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SLACK_ENABLED: ${SLACK_ENABLED:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    depends_on:
      - postgres
    networks:
      - airport-chat-net

volumes:
  postgres-data:

networks:
  airport-chat-net:
    external: true